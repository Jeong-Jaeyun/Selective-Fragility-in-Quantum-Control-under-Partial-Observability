experiment:
  name: twobody_scalability_compact
  output_dir: results
  qubit_counts: [2, 3, 4]
  train_seeds: [11, 17]
  test_seeds: [101, 103]
  backend_types: ["shot"]
  shot_list: [8192]
  probe_state_family: bell
  target_state_families: ["bell_i", "rotated_product"]
  feature_names: ["z_mean", "parity", "coherence_proxy", "phase_cos_component", "phase_sin_component", "transverse_norm"]
  threshold_feature: "phase_sin_component"
  classifier: "logistic"
  survival_feature: "phase_sin_component"
  collapse_threshold: 0.9

system:
  hamiltonian_type: xx_zz
  evolution_time: 0.4
  trotter_steps: 1
  evolution_method: exact
  jx: 1.0
  jy: 0.0
  jz: 0.5
  hx: 0.0
  hz: 0.2

probe_system:
  hamiltonian_type: xx_zz
  evolution_time: 0.0
  trotter_steps: 1
  evolution_method: exact
  jx: 1.0
  jy: 0.0
  jz: 0.5
  hx: 0.0
  hz: 0.2

noise:
  phi: 0.0
  gamma_dephasing: 0.0
  eta_amplitude: 0.0
  p_depolarizing: 0.0
  p_measurement: 0.0

transition:
  noise_axis: gamma_dephasing
  noise_values: [0.0, 0.08, 0.15, 0.25, 0.30]
  fixed_phi: 0.8
  fixed_gamma: 0.0

composite:
  noise_values: [0.0, 0.25, 0.50, 0.75, 1.0]
  scales:
    phi: 0.8
    gamma_dephasing: 0.3
    eta_amplitude: 0.15
    p_measurement: 0.1
