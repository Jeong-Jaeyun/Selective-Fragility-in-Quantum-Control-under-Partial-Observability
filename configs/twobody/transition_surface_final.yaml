experiment:
  name: twobody_appendix_final
  output_dir: results
  train_seeds: [11, 17, 23]
  test_seeds: [101, 103, 107, 109]
  backend_types: ["shot"]
  shot_list: [4096]
  probe_state_family: bell
  target_state_families: ["bell", "bell_i"]
  feature_names: ["phase_cos_component", "phase_sin_component"]
  threshold_feature: "phase_sin_component"
  classifier: "threshold"
  survival_feature: "phase_sin_component"

system:
  n_qubits: 2
  hamiltonian_type: xx_zz
  evolution_time: 0.0
  trotter_steps: 1
  evolution_method: exact
  jx: 1.0
  jy: 0.0
  jz: 0.5
  hx: 0.0
  hz: 0.2

noise:
  phi: 0.8
  gamma_dephasing: 0.0
  eta_amplitude: 0.0
  p_depolarizing: 0.0
  p_measurement: 0.0

maps:
  - name: gamma_vs_amplitude
    axis_x: gamma_dephasing
    axis_y: eta_amplitude
    values_x: [0.0, 0.05, 0.1, 0.2, 0.3]
    values_y: [0.0, 0.04, 0.08, 0.12, 0.16]
    fixed_overrides:
      phi: 0.8
      p_measurement: 0.0
  - name: gamma_vs_measurement
    axis_x: gamma_dephasing
    axis_y: p_measurement
    values_x: [0.0, 0.05, 0.1, 0.2, 0.3]
    values_y: [0.0, 0.02, 0.04, 0.06, 0.08, 0.10]
    fixed_overrides:
      phi: 0.8
      eta_amplitude: 0.0
