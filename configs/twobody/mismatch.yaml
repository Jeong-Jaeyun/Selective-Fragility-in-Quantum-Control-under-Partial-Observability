experiment:
  name: twobody_mismatch
  output_dir: results
  train_seeds: [11, 17, 23]
  test_seeds: [101, 103, 107]
  backend_types: ["shot"]
  shot_list: [2048]
  probe_state_family: bell
  target_state_families: ["bell", "bell_i"]
  feature_names: ["phase_cos_component", "phase_sin_component"]
  threshold_feature: "phase_sin_component"
  classifiers: ["threshold", "linear", "logistic"]

system:
  n_qubits: 2
  hamiltonian_type: xx_zz
  evolution_time: 0.0
  trotter_steps: 1
  evolution_method: exact
  jx: 1.0
  jy: 0.0
  jz: 0.5
  hx: 0.0
  hz: 0.2

noise:
  eta_amplitude: 0.0
  p_depolarizing: 0.0
  p_measurement: 0.0

sweep:
  phi: [0.0, 0.4, 0.8, 1.2]
  gamma_dephasing: [0.0, 0.1, 0.2, 0.3]

scenarios:
  - name: strength_mismatch_low_to_high
    type: strength_mismatch
    train_noise_overrides:
      gamma_dephasing: 0.05
  - name: channel_mismatch_dephasing_to_amp
    type: channel_mismatch
    train_noise_overrides:
      gamma_dephasing: 0.1
    test_noise_overrides:
      eta_amplitude: 0.1
  - name: probe_transfer_bell_i
    type: state_transfer
    test_probe_state_family: bell_i
  - name: probe_transfer_rotated
    type: state_transfer
    test_probe_state_family: rotated_product
  - name: probe_transfer_random
    type: state_transfer
    test_probe_state_family: random_low_depth
