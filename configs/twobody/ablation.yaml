experiment:
  name: twobody_ablation
  output_dir: results
  train_seeds: [11, 17, 23]
  test_seeds: [101, 103, 107]
  backend_types: ["shot"]
  shot_list: [8192]
  probe_state_family: bell
  target_state_families: ["bell", "bell_i"]
  feature_names: ["phase_cos_component", "phase_sin_component"]
  threshold_feature: "phase_sin_component"
  classifiers: ["threshold", "linear", "logistic"]

system:
  n_qubits: 2
  hamiltonian_type: xx_zz
  evolution_time: 0.0
  trotter_steps: 1
  evolution_method: exact
  jx: 1.0
  jy: 0.0
  jz: 0.5
  hx: 0.0
  hz: 0.2

noise:
  eta_amplitude: 0.0
  p_depolarizing: 0.0
  p_measurement: 0.0

sweep:
  phi: [0.0, 0.4, 0.8, 1.2]
  gamma_dephasing: [0.0, 0.1, 0.2, 0.3]

ablations:
  - name: phase_pair
    group: feature_set
    feature_names: ["phase_cos_component", "phase_sin_component"]
    threshold_feature: "phase_sin_component"
  - name: phase_sin_only
    group: feature_set
    feature_names: ["phase_sin_component"]
    threshold_feature: "phase_sin_component"
  - name: phase_cos_only
    group: feature_set
    feature_names: ["phase_cos_component"]
    threshold_feature: "phase_cos_component"
  - name: phi_only
    group: noise_axis
    phi: [0.0, 0.4, 0.8, 1.2]
    gamma_dephasing: [0.0]
  - name: gamma_only
    group: noise_axis
    phi: [0.0]
    gamma_dephasing: [0.0, 0.1, 0.2, 0.3]
  - name: full_phase_gamma
    group: noise_axis
    phi: [0.0, 0.4, 0.8, 1.2]
    gamma_dephasing: [0.0, 0.1, 0.2, 0.3]
